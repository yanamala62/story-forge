# =============================================================================
# StoryForge AI — Full Production Stack
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &restart-policy
  restart: unless-stopped

networks:
  storyforge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  ollama_data:
  generated_content:

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    logging: *default-logging
    environment:
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: storyforge_password
      POSTGRES_DB: storyforge_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - storyforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # AI Services
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    <<: *restart-policy
    logging: *default-logging
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - storyforge-net
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    <<: *restart-policy
    logging: *default-logging
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://storyforge:storyforge_password@postgres:5432/storyforge_db
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - storyforge-net
    volumes:
      - generated_content:/app/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    <<: *restart-policy
    logging: *default-logging
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "3001:80"
    depends_on:
      - api
    networks:
      - storyforge-net

  nginx:
    image: nginx:alpine
    <<: *restart-policy
    logging: *default-logging
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    networks:
      - storyforge-net
